name: Destiny Nightly

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  destiny-nightly:
    name: Full Destiny Nightly
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            backend_ai/requirements.txt
            backend_ai/requirements-dev.txt

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Full Vitest suite
        run: npm test

      - name: Destiny full gate
        run: npm run ops:destiny:gate

      - name: Upload nightly vitest log placeholder
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: destiny-nightly-metadata
          path: |
            reports/ops/*.json
            reports/ops/*.md
          if-no-files-found: ignore
          retention-days: 14
