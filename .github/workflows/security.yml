name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Run npm audit
        # production 의존성만 — dev/test 도구(vitest 등) CVE 로 릴리스 게이트를
        # 막지 않는다(그 취약점은 빌드 산출물에 안 실림). 런타임 의존성만 본다.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Check for vulnerabilities
        run: |
          AUDIT_RESULT=$(npm audit --omit=dev --json 2>/dev/null || true)
          HIGH_VULNS=$(echo "$AUDIT_RESULT" | jq '.metadata.vulnerabilities.high // 0')
          CRITICAL_VULNS=$(echo "$AUDIT_RESULT" | jq '.metadata.vulnerabilities.critical // 0')

          # 업스트림 패치가 아직 없어(fixAvailable=false) override 로 못 고치는
          # 취약점만 예외 등록한다. 새로 뜨는 "다른" high/critical 은 그대로 게이트를
          # 막으므로 게이트는 여전히 유효하다. 각 항목은 사유 명시:
          #   swagger-ui-react: 내부 API 문서 뷰어(/api-docs) 전용. robots 차단,
          #     공개 노출 없음. 패키지 전체가 flagged(range=*) 라 업스트림 수정본
          #     자체가 없다.
          #   immutable: 위 swagger-ui-react 가 유일하게 끌어오는 전이 의존성(3.8.3).
          #     swagger 를 3.x 에 묶어 두므로 단독 상향 불가.
          #   next: 안정판(latest=16.2.11)이 아직 취약 범위(… - 16.3.0-canary.5) 안이라
          #     override 로 못 고친다 — 수정본은 16.3.0-preview.* 프리릴리스뿐이라
          #     결제·인증 프로덕션 앱을 preview 로 올리는 게 더 위험. 노출도: 프로덕션
          #     빌드는 `next build`+`next start`(Turbopack 아님, 커스텀 서버 아님)라
          #     최고위험 2건(Turbopack 미들웨어/인증 우회, 커스텀서버 SSRF)이 비해당.
          #     16.3.0 안정판 나오면 상향하고 이 항목 제거. (등록일 2026-07-23.)
          # 재점검: swagger-ui-react 가 패치를 내거나 /api-docs 를 제거하면 · next 16.3.0
          # 안정판이 나오면 해당 항목을 비운다. (등록일 2026-07-22.)
          ALLOWLIST="swagger-ui-react immutable next"

          # 예외 목록에 없는 high/critical 만 센다 — 하나라도 있으면 차단.
          UNACCOUNTED=$(echo "$AUDIT_RESULT" | jq -r --arg allow "$ALLOWLIST" '
            ($allow | split(" ")) as $a
            | [.vulnerabilities // {} | to_entries[]
               | select(.value.severity == "high" or .value.severity == "critical")
               | select(.key as $k | ($a | index($k)) | not)
               | .key] | length')

          echo "High: $HIGH_VULNS · Critical: $CRITICAL_VULNS · Allowlisted: $ALLOWLIST"
          echo "Unaccounted (excluding allowlist): $UNACCOUNTED"

          if [ "$UNACCOUNTED" -gt 0 ]; then
            echo "::error::Unaccounted high/critical vulnerabilities in production dependencies (not on allowlist):"
            echo "$AUDIT_RESULT" | jq -r --arg allow "$ALLOWLIST" '
              ($allow | split(" ")) as $a
              | .vulnerabilities // {} | to_entries[]
              | select(.value.severity == "high" or .value.severity == "critical")
              | select(.key as $k | ($a | index($k)) | not)
              | "  - \(.key) [\(.value.severity)]"'
            exit 1
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Run ESLint security rules
        run: npm run lint
        continue-on-error: true

  env-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for exposed secrets in code
        run: |
          # Check for common secret patterns in source code
          PATTERNS=(
            "sk-[a-zA-Z0-9]{20,}"
            "AKIA[A-Z0-9]{16}"
            "ghp_[a-zA-Z0-9]{36}"
            "gho_[a-zA-Z0-9]{36}"
            "-----BEGIN.*PRIVATE KEY-----"
          )

          FOUND_SECRETS=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" src/ 2>/dev/null; then
              echo "::warning::Potential secret pattern found: $pattern"
              FOUND_SECRETS=1
            fi
          done

          if [ "$FOUND_SECRETS" -eq 1 ]; then
            echo "::error::Potential secrets found in source code!"
            exit 1
          fi

          echo "No secrets found in source code"

      - name: Check .env files are gitignored
        run: |
          if git ls-files --error-unmatch .env .env.local 2>/dev/null; then
            echo "::error::.env files are tracked in git! Remove them immediately!"
            exit 1
          fi
          echo ".env files are properly gitignored"
